<!doctype html>
<html lang="en-gb">

<head>
    <meta charset="utf-8">
    <title>Othello</title>
    <link rel="stylesheet" href="default.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.png">
    <script type="module" src="main.js"></script>
</head>

<body>

    <div class="game-container">

        <header>
            <div class="logo">OTHELLO</div>
            <div class="controls">
                <button class="show-moves">
                    <img src="assets/Vector 27.svg" class="control-icon eye" alt="" />
                </button>
                <button class="restart">
                    <img src="assets/Vector 12.svg" class="control-icon restart" alt="" />
                </button>

            </div>
        </header>
        <div class="game-info">
            <div class="current player">Player 1's Turn</div>
        </div>


        <main class="game">

            <section class="player-panel left">
                <div class="score red" id="red-score">2</div>
                <div class="disc-stack red-stack"></div>
            </section>

            <div class="extended-game-field" id="grid-container">
                <section class="game-board" id="game-board" tabindex="0">
                </section>
            </div>

            <section class="player-panel right">
                <div class="score blue" id="blue-score">2</div>
                <div class="disc-stack blue-stack"></div>
            </section>

        </main>

    </div>

    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h1 id="winner-text">Player Wins!</h1>
            <div class="modal-scores">
                <div class="final-score red-score-modal">Red: <span id="modal-red-score">0</span></div>
                <div class="final-score blue-score-modal">Blue: <span id="modal-blue-score">0</span></div>
            </div>
            <button id="modal-restart-btn">Play Again</button>
        </div>
    </div>

</body>

</html>
